name: pacifica-cleaning

services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: pacifica
      POSTGRES_USER: pacifica
      POSTGRES_PASSWORD: pacifica_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacifica -d pacifica"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/library/redis:8-alpine
    command: ["redis-server", "--appendonly", "yes", "--bind", "0.0.0.0", "--protected-mode", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgres://pacifica:pacifica_dev_password@db:5432/pacifica
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_initial_data &&
             gunicorn pacifica.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    env_file: .env
    profiles: ["async"]
    environment:
      DATABASE_URL: postgres://pacifica:pacifica_dev_password@db:5432/pacifica
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A pacifica worker --loglevel=INFO
    volumes:
      - media_data:/app/media
    depends_on:
      - api

  beat:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    env_file: .env
    profiles: ["async"]
    environment:
      DATABASE_URL: postgres://pacifica:pacifica_dev_password@db:5432/pacifica
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A pacifica beat --loglevel=INFO
    depends_on:
      - api

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    volumes:
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: docker.io/library/nginx:1.30.3-alpine
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
  frontend_dist:
