name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: pacifica
          POSTGRES_USER: pacifica
          POSTGRES_PASSWORD: pacifica
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8.0.18-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip==25.1.1
      - run: pip install -r backend/requirements-dev.txt
      - run: ruff check backend
      - run: cd backend && python manage.py test tests
        env:
          DJANGO_SECRET_KEY: ci-secret-key-for-tests-only
          DJANGO_DEBUG: "false"
          DATABASE_URL: postgres://pacifica:pacifica@localhost:5432/pacifica
          REDIS_URL: redis://localhost:6379/0
          CELERY_TASK_ALWAYS_EAGER: "true"
      - run: bandit -r backend -x backend/tests
      - run: pip-audit -r backend/requirements.txt

  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24.17.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run test -- --run
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "24.17.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m venv backend/.venv
      - run: backend/.venv/bin/pip install -r backend/requirements-dev.txt
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
